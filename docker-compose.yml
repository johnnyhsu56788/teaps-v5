version: '3.8'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: teaps_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${TEAPS_DB_PASSWORD:-teaps_root_password}
      MYSQL_DATABASE: teaps_v5
      MYSQL_USER: teaps_user
      MYSQL_PASSWORD: ${TEAPS_DB_USER_PASSWORD:-teaps_user_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "3306:3306"
    networks:
      - teaps_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # TEAPS v5 Application Service
  teaps:
    build: .
    container_name: teaps_app
    restart: unless-stopped
    environment:
      # Database Configuration
      TEAPS_DB_HOST: mysql
      TEAPS_DB_PORT: "3306"
      TEAPS_DB_NAME: teaps_v5
      TEAPS_DB_USER: teaps_user
      TEAPS_DB_PASSWORD: ${TEAPS_DB_USER_PASSWORD:-teaps_user_password}
      
      # Telegram Bot Configuration (Set these in .env file)
      TEAPS_TELEGRAM_BOT_TOKEN: ${TEAPS_TELEGRAM_BOT_TOKEN:-your_bot_token_here}
      
      # QR Code Secret (optional, auto-generated if not set)
      QR_SECRET_KEY: ${QR_SECRET_KEY:-auto_generated_secret_key}
      
      # Web Server Configuration
      TEAPS_WEB_HOST: "0.0.0.0"
      TEAPS_WEB_PORT: "8000"
    ports:
      - "8000:8000"  # Web API
      - "8765:8765"  # Telegram Bot (optional, for debugging)
    volumes:
      - ./logs:/app/logs
      - .env:/app/.env:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - teaps_network
    command: python teaps.py all

  # Optional: Nginx Reverse Proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: teaps_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # For HTTPS (optional)
    depends_on:
      - teaps
    networks:
      - teaps_network

networks:
  teaps_network:
    driver: bridge

volumes:
  mysql_data:
